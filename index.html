<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美食地图</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #c1642a;
    --primary-hover: #a84f1f;
    --on-primary: #ffffff;
    --ink: #2b2118;
    --ink-muted: #5c4d3d;
    --ink-subtle: #8a7a66;
    --canvas: #f5ede0;
    --surface-1: #fffaf2;
    --surface-2: #f0e4d0;
    --hairline: #e8dcc8;
    --hairline-strong: #d8c8ab;
    --primary-tint: rgba(193, 100, 42, 0.14);
    --gold: #a3690f;
    /* 统一的浮层设计变量:所有卡片/面板共用同一套阴影/圆角/间距,不再各自
       攒了一套——这几个数字之前是每加一个新面板就顺手抄一遍上一个的写法,
       攒下来出现了 0.4/0.28/0.25 好几个相近但不同的透明度,肉眼看不出差别
       却让代码里的"标准值"变得模糊。收拢成三个 token 后,以后新加面板直接
       引用,不再重新决定一遍数值。 */
    --shadow-panel: 0 4px 20px rgba(43, 33, 24, .28);
    --shadow-accent: 0 4px 14px rgba(193, 100, 42, .4);
    --radius-panel: 12px;
    --radius-control: 10px;
    --radius-small: 8px;
    --space-panel: 10px 16px;
    color-scheme: light;
}
body { font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, sans-serif; background: var(--canvas); color: var(--ink); height: 100vh; overflow: hidden; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--canvas); }
/* 纯 CSS 滤镜给底图调色,让颜色更鲜活、更接近插画感——不用换成需要 API
   key 的卡通风格地图服务,底图数据源不变,只是显示时"调了个滤镜"。
   上一版数值太温和(1.45/1.08/1.02/.06),肉眼几乎看不出跟原图的差别,
   这次加大到能一眼看出色彩变化的程度。
   滤镜强度按缩放层级分三档(见 JS 里的 zoomend 监听):缩得越远(洲/世界
   视图)加得越猛,因为这时候看不清道路文字,浓一点不影响易读性;放大到
   街道级别再减弱,避免盖掉路名标签的可读性。 */
.lively-tiles { filter: saturate(2.2) contrast(1.15) brightness(1.05) sepia(.12) hue-rotate(-4deg); transition: filter .3s; }
.lively-tiles.zoom-far { filter: saturate(3.2) contrast(1.28) brightness(1.1) sepia(.2) hue-rotate(-6deg); }
.lively-tiles.zoom-near { filter: saturate(1.4) contrast(1.05) brightness(1.02) sepia(.05); }
.topbar {
    position: absolute; top: 16px; left: 16px; z-index: 1000;
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-panel);
    padding: 12px 16px; min-width: 220px; box-shadow: var(--shadow-panel);
}
.topbar h1 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.topbar .sub { font-size: 12px; color: var(--ink-subtle); }
.topbar .stat { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }
.blogger-select {
    margin-top: 6px; padding: 4px 6px; border-radius: var(--radius-small); border: 1px solid var(--hairline);
    background: var(--surface-2); color: var(--ink); font-size: 12px; outline: none; cursor: pointer; width: 100%;
}
.blogger-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.blogger-legend .item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-subtle); }
.blogger-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.poi-blogger-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 5px;
    background: var(--primary-tint); color: var(--primary-hover); font-size: 11px; font-weight: 600; vertical-align: middle;
}
.leaflet-popup-content-wrapper { background: var(--surface-1); color: var(--ink); border-radius: var(--radius-panel); border: 1px solid var(--hairline); }
.leaflet-popup-tip { background: var(--surface-1); }
.leaflet-popup-content { margin: 12px 14px; }
.leaflet-popup-close-button { color: var(--ink-subtle) !important; }
.poi-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
.visit { padding: 8px 0; border-top: 1px solid var(--hairline); }
.visit:first-child { border-top: none; padding-top: 0; }
.visit-date { font-size: 12px; color: var(--ink-subtle); margin-bottom: 3px; }
.visit-dishes span { display: inline-block; padding: 1px 7px; margin: 2px 3px 0 0; background: var(--primary-tint); border-radius: 5px; color: var(--primary-hover); font-size: 11px; }
.visit-quote { font-size: 13px; color: var(--ink-muted); line-height: 1.5; margin-top: 4px; }
.visit-link { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--primary-hover); text-decoration: none; }
.visit-link:hover { text-decoration: underline; }
.empty-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 999;
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-panel);
    box-shadow: var(--shadow-panel); padding: 20px 26px; max-width: 320px;
    color: var(--ink-subtle); font-size: 13px; text-align: center; line-height: 1.6;
}
.empty-hint::before { content: '🍽️'; display: block; font-size: 28px; margin-bottom: 8px; }
/* 标记/聚类气泡加载时错落地"弹"出来,而不是一次性全部瞬间出现——
   animation-delay 由 JS 按索引算出(见 makeFoodIcon),cluster-pin 因为是
   Leaflet.markercluster 内部动态生成、拿不到稳定索引,只播放不带延迟的
   基础版本,依然比完全没有动画生硬地贴上去要好。 */
@keyframes pin-pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.food-pin, .cluster-pin { animation: pin-pop .3s cubic-bezier(.34,1.56,.64,1) backwards; }
.food-pin { display: flex; align-items: center; justify-content: center; border-radius: 50%; background: radial-gradient(circle at 32% 28%, #fffdf8, var(--surface-1) 60%, #e9dcc4 100%); border: 2px solid var(--primary); box-shadow: inset 0 1px 2px rgba(255,255,255,.9), inset 0 -3px 4px rgba(43,33,24,.18), 0 2px 8px rgba(43,33,24,.25); }
.food-icon-img { display: block; } /* img 默认是 inline,基线对齐会留一点缝,block 才能真正居中 */
.food-pin.repeat { border-color: var(--gold); box-shadow: inset 0 1px 2px rgba(255,255,255,.9), inset 0 -3px 4px rgba(43,33,24,.18), 0 0 10px rgba(163,105,15,.4); }
.cluster-pin { display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 600; box-shadow: inset 0 1px 2px rgba(255,255,255,.5), inset 0 -3px 4px rgba(0,0,0,.2), 0 2px 10px rgba(43,33,24,.3); }
.cluster-pin.tier-1 { background: radial-gradient(circle at 32% 28%, #fbe8d0, #f0c9a0 60%, #dba876 100%); border: 2px solid #e0ab74; color: #5c3a1e; }
.cluster-pin.tier-2 { background: radial-gradient(circle at 32% 28%, #f0b37f, #d98a4f 60%, #b56a35 100%); border: 2px solid #c1642a; color: #fff; }
.cluster-pin.tier-3 { background: radial-gradient(circle at 32% 28%, #d97545, #b8491f 60%, #8f3512 100%); border: 2px solid #963a17; color: #fff; }
.cluster-pin.tier-4 { background: radial-gradient(circle at 32% 28%, #a34530, #7a2015 60%, #5c130a 100%); border: 2px solid #5c160f; color: #fff; }
.sidebar-toggle {
    position: absolute; top: 16px; left: 252px; z-index: 1000;
    width: 36px; height: 36px; border-radius: var(--radius-control); border: 1px solid var(--hairline);
    background: var(--surface-1); color: var(--ink); font-size: 16px; cursor: pointer;
    box-shadow: var(--shadow-panel); transition: left .2s;
}
/* 折叠态下按钮挪到左上角——但那正是标题卡所在位置,top 也必须跟着标题卡
   实际高度动态挪(见 repositionSidebar),不能写死 16px,否则两者会叠在一起 */
.sidebar-toggle.collapsed { left: 16px; }
.sidebar {
    position: absolute; left: 16px; width: 236px; max-height: 50vh; z-index: 999;
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-panel);
    box-shadow: var(--shadow-panel); display: flex; flex-direction: column; overflow: hidden;
    transition: transform .2s, opacity .2s;
}
.sidebar.collapsed { transform: translateX(-260px); opacity: 0; pointer-events: none; }
.sidebar-search {
    margin: 10px; padding: 8px 10px; border-radius: var(--radius-small); border: 1px solid var(--hairline);
    background: var(--surface-2); color: var(--ink); font-size: 13px; outline: none;
}
.sidebar-search::placeholder { color: var(--ink-subtle); }
.region-filters {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 0 10px 10px;
}
.region-filters select {
    width: 100%; padding: 6px 6px; border-radius: var(--radius-small); border: 1px solid var(--hairline);
    background: var(--surface-2); color: var(--ink); font-size: 12px; outline: none; cursor: pointer;
}
.sidebar-list { flex: 1; overflow-y: auto; padding: 0 6px 10px; }
.sidebar-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 8px; border-radius: var(--radius-small); cursor: pointer;
}
.sidebar-item:hover { background: var(--surface-2); }
.sidebar-item .emoji { font-size: 16px; flex-shrink: 0; }
.sidebar-item .name { flex: 1; font-size: 13px; color: var(--ink-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-item .count { font-size: 11px; color: var(--ink-subtle); flex-shrink: 0; }
.sidebar-item .count.repeat { color: var(--gold); }
.sidebar-item .blogger-tag { font-size: 10px; color: var(--ink-subtle); flex-shrink: 0; padding: 1px 5px; background: var(--surface-2); border-radius: 4px; }
.sidebar-empty { padding: 16px; font-size: 12px; color: var(--ink-subtle); text-align: center; }
.timebar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 1000;
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-panel);
    padding: var(--space-panel); box-shadow: var(--shadow-panel);
    display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--ink-muted);
}
.timebar input[type=range] { width: 160px; accent-color: var(--primary-hover); }
.timebar .year-label { min-width: 30px; text-align: center; color: var(--ink); font-weight: 600; }
.timebar .timebar-label { font-weight: 600; color: var(--ink); padding-right: 6px; border-right: 1px solid var(--hairline); margin-right: 4px; }
.timebar .reset-btn { color: var(--primary-hover); cursor: pointer; font-size: 11px; padding: 2px 6px; }
.timebar .reset-btn:hover { text-decoration: underline; }
/* 单轴双手柄区间滑块:两个原生 range 输入完全重叠,轨道透明只露出手柄,
   中间垫一条可见的轨道 + 高亮条(range-fill)表示当前选中区间。手柄靠
   ::-webkit/moz-range-thumb 的 pointer-events:auto 单独接收点击,输入
   本身 pointer-events:none,这样两个手柄互不打架,各管各的拖动。 */
.range-slider { position: relative; width: 170px; height: 20px; flex-shrink: 0; }
/* 原生 range 手柄(16px 直径)实际可移动范围是 [8px, 容器宽度-8px],不是
   [0, 100%]——手柄中心到不了容器边缘。轨道/高亮条按这个真实范围内缩
   8px,否则数值到最大时手柄看着"没到最右端"(轨道比手柄能走到的地方长)。 */
.range-track { position: absolute; top: 9px; left: 8px; right: 8px; height: 4px; background: var(--hairline-strong); border-radius: 2px; }
.range-fill { position: absolute; top: 9px; height: 4px; background: var(--primary); border-radius: 2px; }
.range-input {
    position: absolute; top: 0; left: 0; width: 100%; height: 20px; margin: 0;
    -webkit-appearance: none; appearance: none; background: transparent; pointer-events: none;
}
.range-input::-webkit-slider-thumb {
    -webkit-appearance: none; pointer-events: auto; width: 16px; height: 16px; border-radius: 50%;
    background: var(--primary); border: 2px solid var(--surface-1); box-shadow: 0 1px 4px rgba(43,33,24,.4); cursor: pointer;
}
.range-input::-moz-range-thumb {
    pointer-events: auto; width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--surface-1);
    background: var(--primary); box-shadow: 0 1px 4px rgba(43,33,24,.4); cursor: pointer;
}
.range-input::-webkit-slider-runnable-track { background: transparent; }
.range-input::-moz-range-track { background: transparent; }
.locate-btn {
    display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; padding: 0; margin: 0;
    background: var(--primary); color: var(--on-primary); border: none; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    box-shadow: var(--shadow-accent);
}
.locate-btn:hover { background: var(--primary-hover); }
.locate-btn.loading { opacity: .6; cursor: wait; }
.user-dot { position: relative; width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 32% 28%, #a8d4ff, #4da6ff 60%, #2a7fd4 100%); border: 3px solid #fff; box-shadow: inset 0 1px 1px rgba(255,255,255,.7), 0 0 0 4px rgba(77,166,255,.35); }
.user-dot::after { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid #4da6ff; animation: pulse 1.6s ease-out infinite; }
/* 首次进入时指向"定位"按钮的引导气泡,点一次/等几秒/点气泡本身都会消失,
   localStorage 记住看过了,不会每次刷新都弹 */
.pointer-hint {
    position: fixed; z-index: 1001; background: var(--primary); color: var(--on-primary);
    padding: 8px 14px; border-radius: var(--radius-control); font-size: 12px; font-weight: 600; white-space: nowrap;
    width: 190px; text-align: center; box-sizing: border-box; /* 统一宽度,不然三个提示文字长短不一,气泡宽度参差不齐很难看 */
    box-shadow: var(--shadow-accent); cursor: pointer;
    opacity: 0; transition: opacity .3s; animation: hint-nudge 1.4s ease-in-out infinite;
}
.pointer-hint.show { opacity: 1; }
/* 默认箭头在气泡右侧,指向屏幕右边的目标(比如右上角的定位按钮) */
.pointer-hint::after {
    content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    border-width: 6px 0 6px 6px; border-style: solid; border-color: transparent transparent transparent var(--primary);
}
/* 目标在屏幕左边(比如左上角的餐厅列表按钮)时,箭头要翻到气泡左侧朝左指 */
.pointer-hint.arrow-left::after {
    right: auto; left: -6px;
    border-width: 6px 6px 6px 0; border-color: transparent var(--primary) transparent transparent;
}
.pointer-hint.arrow-left { animation: hint-nudge-left 1.4s ease-in-out infinite; }
@keyframes hint-nudge { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }
@keyframes hint-nudge-left { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
@keyframes pulse { 0% { transform: scale(.4); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
.nearby-banner { display: flex; justify-content: space-between; align-items: center; margin: 0 10px 8px; font-size: 12px; color: var(--ink-subtle); }
.nearby-banner .back { color: var(--primary-hover); cursor: pointer; }
.nearby-banner .back:hover { text-decoration: underline; }
.sidebar-item .dist { font-size: 11px; color: var(--ink-subtle); flex-shrink: 0; }
/* 旅行轨迹回放:开关按钮样式同定位按钮,激活时换个颜色表明"正在轨迹模式" */
.journey-btn {
    display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; padding: 0; margin: 0;
    background: var(--surface-1); color: var(--ink); border: none; border-radius: 50%;
    cursor: pointer; font-size: 15px; box-shadow: var(--shadow-panel);
}
.journey-btn:hover { background: var(--surface-2); }
.journey-btn.active { background: #2f6f4f; color: #fff; }
.journey-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 1000;
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: var(--radius-panel);
    padding: var(--space-panel); box-shadow: var(--shadow-panel);
    display: none; flex-direction: column; gap: 6px; font-size: 12px; color: var(--ink-muted); max-width: 90vw;
}
.journey-bar.show { display: flex; }
.journey-controls { display: flex; align-items: center; gap: 10px; }
.journey-play { background: #2f6f4f; color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 13px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
.journey-progress { flex-shrink: 0; }
.journey-progress input[type=range] { width: 160px; accent-color: #2f6f4f; }
.journey-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); font-weight: 600; flex: 1; }
.journey-exit { color: var(--primary-hover); cursor: pointer; flex-shrink: 0; }
.journey-exit:hover { text-decoration: underline; }
.journey-legend { display: flex; flex-wrap: wrap; gap: 8px; max-width: 460px; }
.journey-legend .item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--ink-subtle); }
.journey-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* 两段之间距离远用飞机、距离近用汽车(见 setupJourney 的 journeyIcon),
   图标本身放大到能装下一个 emoji,不再是纯色小圆点 */
.journey-marker { position: relative; width: 26px; height: 26px; border-radius: 50%; background: radial-gradient(circle at 32% 28%, #6fae8a, #2f6f4f 60%, #1f4d35 100%); border: 3px solid #fff; box-shadow: inset 0 1px 2px rgba(255,255,255,.6), inset 0 -2px 3px rgba(0,0,0,.2), 0 0 0 4px rgba(47,111,79,.35); display: flex; align-items: center; justify-content: center; font-size: 13px; }
.journey-marker::after { content: ''; position: absolute; inset: -7px; border-radius: 50%; border: 2px solid #2f6f4f; animation: pulse 1.6s ease-out infinite; }
/* 轨迹回放路过的每个地点留一个小图标(见 setupJourney 的 rebuildStopMarkers)
   ——比地图默认的 food-pin 小一圈,不会跟正在移动的车/飞机图标抢视觉重心,
   纯粹是"走过的路"的留痕 */
.journey-stop { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle at 32% 28%, #fffdf8, var(--surface-1) 60%, #e9dcc4 100%); border: 2px solid var(--primary); font-size: 11px; box-shadow: inset 0 1px 1px rgba(255,255,255,.9), 0 1px 4px rgba(43,33,24,.3); animation: pin-pop .25s cubic-bezier(.34,1.56,.64,1) backwards; }
/* 手机窄屏:这些面板的宽度都是按桌面尺寸一个个手动定的(236px 侧栏、
   170px 滑块……),窄屏上要么整体超出屏幕右边被裁掉,要么互相挤在一起。
   核心思路是把"宽度由内容撑开"改成"宽度受屏幕限制、内部元素让路"。 */
@media (max-width: 640px) {
    .topbar { min-width: 0; max-width: calc(100vw - 32px); }
    .sidebar { width: calc(100vw - 32px); max-width: 320px; }
    /* 展开态下 toggle 原本靠"侧栏宽度+间距"算出一个固定偏移(252px),
       侧栏宽度在窄屏上是动态的,这个偏移会算错——干脆固定贴在侧栏
       右侧一小段距离,不再跟侧栏宽度绑定 */
    .sidebar-toggle { left: calc(100vw - 52px); }
    .sidebar-toggle.collapsed { left: 16px; }
    .timebar { max-width: calc(100vw - 24px); padding: 8px 10px; gap: 6px; }
    .timebar .timebar-label { display: none; }
    .timebar .range-slider { width: 100px; }
    .journey-bar { padding: 8px 10px; }
    .journey-controls { gap: 6px; }
    .journey-progress input[type=range] { width: 90px; }
}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
    <h1 id="bloggerName">美食地图</h1>
    <div class="sub">来自微博个人主页动态的地理标记</div>
    <div class="stat" id="stat"></div>
    <select class="blogger-select" id="bloggerSelect"></select>
    <div class="blogger-legend" id="bloggerLegend"></div>
</div>
<div class="empty-hint" id="emptyHint" style="display:none"></div>
<button class="sidebar-toggle collapsed" id="sidebarToggle" title="餐厅列表">☰</button>
<div class="sidebar collapsed" id="sidebar">
    <input class="sidebar-search" id="sidebarSearch" placeholder="搜索餐厅…">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const params = new URLSearchParams(location.search);
// 未指定 ?name= 时默认展示随仓库附带的示例数据(陈晓卿);其他博主的数据
// 需要你本地跑过 fetch-posts.mjs/extract-restaurants.mjs 后用 ?name=<博主名> 查看。
// ?name=all 是特殊值,表示合并 bloggers.json 里列出的所有博主一起看。
const DEFAULT_BLOGGER = '陈晓卿';
const bloggerName = params.get('name') || DEFAULT_BLOGGER;

// 与 extract-restaurants.mjs 的 dataDir() 保持一致的目录名清洗规则
function safeName(name) {
    return String(name).replace(/[^a-zA-Z0-9一-鿿]/g, '_');
}

// 纯静态站点没法"列目录"看有哪些博主的数据,只能维护一份清单文件——
// 加载失败(比如 fork 了仓库但还没建这个文件)就退化成只有当前博主一个
// 选项,不报错,下拉框本身也就没什么用但不影响地图正常显示。
async function loadBloggerList() {
    try {
        const resp = await fetch('data/bloggers.json');
        const list = await resp.json();
        return Array.isArray(list) && list.length ? list : [bloggerName];
    } catch {
        return [bloggerName];
    }
}

function setupBloggerSelect(allBloggers) {
    const sel = document.getElementById('bloggerSelect');
    sel.innerHTML = allBloggers.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('')
        + '<option value="all">全部</option>';
    sel.value = bloggerName; // bloggerName 是 'all' 或某个具体名字,跟 option 的 value 对应
    sel.addEventListener('change', () => {
        location.search = '?name=' + encodeURIComponent(sel.value);
    });
}

// 暖色底图(CartoDB Voyager,免 API key;比纯灰的 Positron 更暖,契合美食主题)
const map = L.map('map', { zoomControl: false }).setView([34, 108], 5);
L.control.zoom({ position: 'topright' }).addTo(map); // 避免与左上角信息卡重叠
const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
    className: 'lively-tiles', // 纯 CSS 滤镜调色,不用额外的地图服务/API key
}).addTo(map);

// 跟踪瓦片是否加载完——轨迹回放跳到新区域时用得上(见 setupJourney 的
// waitForTiles):不能让车/飞机图标在瓦片还没画出来的空白/半空白底图上
// 就开始滑动,那样看起来像"漂浮在虚空里"
let tilesReady = true;
baseLayer.on('loading', () => { tilesReady = false; });
baseLayer.on('load', () => { tilesReady = true; });

// 滤镜强度跟着缩放层级走:洲/世界视图(zoom<=4)加到最猛,街道级
// (zoom>=12)减弱到不影响路名可读性,中间保持默认强度
function updateTileFilterTier() {
    const el = baseLayer.getContainer();
    if (!el) return;
    const z = map.getZoom();
    el.classList.remove('zoom-far', 'zoom-near');
    if (z <= 4) el.classList.add('zoom-far');
    else if (z >= 12) el.classList.add('zoom-near');
}
map.on('zoomend', updateTileFilterTier);
map.whenReady(updateTileFilterTier);

// 现有 location.continent 字段是中文(来自 geocode-regions.mjs),
// GeoJSON 边界数据里的 CONTINENT 属性是英文,这里做个映射
const CONTINENT_EN = { 亚洲: 'Asia', 欧洲: 'Europe', 非洲: 'Africa', 北美洲: 'North America', 南美洲: 'South America', 大洋洲: 'Oceania' };

// 按洲涂色背景(choropleth):颜色深浅代表该洲拜访次数多少,跟区域/年份
// 筛选联动(见 setupFilters 的 apply() 末尾调用 choropleth.update())。
// 用 sqrt 而不是线性映射次数→透明度,是因为数据往往像陈晓卿这份一样
// 悬殊(亚洲 274 次、欧洲个位数)——线性映射会把小值的洲压得几乎看不见,
// sqrt 让"有一点"和"完全没有"之间的差异更看得出来。
function setupChoropleth(restaurants) {
    // 175 个国家轮廓(还带描边)默认走 SVG 渲染——回放移动/缩放时每一帧都要
    // 重新计算重绘这么多矢量路径,是拖慢移动/缩放体验的主要原因之一。换成
    // Canvas 渲染器:整块图层变成一张位图,缩放/平移时直接跟着变换,不用
    // 逐个路径重算,大量图形叠一起时通常比 SVG 明显跟得上手。
    const choroplethRenderer = L.canvas({ padding: 0.5 });
    const layer = L.geoJSON(null, {
        renderer: choroplethRenderer,
        interactive: false, // 不拦截点击/拖动,纯装饰性背景
        // 之前 color:transparent/weight:0 完全没描边,靠底图自带的那条很细的
        // 国界线透出来——填色不透明度一高就直接把那条线整个盖住,国家之间
        // 看起来糊成一片。改成自己描一条细边,不管填色多深,国家轮廓始终
        // 看得清,不用依赖底图那条容易被盖住的线。
        style: () => ({ color: 'rgba(43,33,24,.35)', weight: 0.7, fillColor: '#c1642a', fillOpacity: 0 }),
    }).addTo(map);
    let baseOpacity = new Map();

    fetch('assets/continents.geojson')
        .then(r => r.json())
        .then(data => { layer.addData(data); update(restaurants); })
        .catch(() => {}); // 纯装饰图层,拉取失败静默跳过,不影响地图核心功能

    // 缩到国家/街道级别时整块颜色会糊住大半个屏幕,反而干扰看细节——
    // 跟瓦片滤镜的三档思路一样,放大到 zoom 9 以上就淡出到完全透明
    function zoomFactor() {
        const z = map.getZoom();
        if (z <= 6) return 1;
        if (z >= 9) return 0;
        return 1 - (z - 6) / 3;
    }
    function applyOpacity() {
        const factor = zoomFactor();
        layer.eachLayer(l => {
            const base = baseOpacity.get(l.feature.properties.continent) || 0;
            l.setStyle({ fillOpacity: base * factor });
        });
    }
    map.on('zoomend', applyOpacity);

    function update(visibleRestaurants) {
        const counts = {};
        for (const r of visibleRestaurants) {
            const en = CONTINENT_EN[r.location && r.location.continent];
            if (!en) continue;
            counts[en] = (counts[en] || 0) + r.visits.length;
        }
        const max = Math.max(1, ...Object.values(counts));
        baseOpacity = new Map(Object.entries(counts).map(([en, c]) => [en, 0.06 + 0.5 * Math.sqrt(c / max)]));
        applyOpacity();
    }
    return { update };
}

// 侧栏顶部跟随信息卡的实际高度,而不是写死一个像素值——统计文字长度会变
// (比如年份筛选后的文案更长换行),写死的话卡片一变高就会和侧栏重叠。
// 折叠按钮同理:折叠态下它会挪到左上角(标题卡所在位置),top 也必须跟
// 标题卡一起动,否则标题卡一变高,折叠按钮就会被压在它上面。
const topbarEl = document.querySelector('.topbar');
const sidebarEl0 = document.getElementById('sidebar');
const sidebarToggleEl0 = document.getElementById('sidebarToggle');
function repositionSidebar() {
    const top = (topbarEl.getBoundingClientRect().bottom + 12) + 'px';
    sidebarEl0.style.top = top;
    sidebarToggleEl0.style.top = top;
}
new ResizeObserver(repositionSidebar).observe(topbarEl);
repositionSidebar();

// "定位我"按钮:作为 Leaflet 控件加进 topright,会自动叠在缩放按钮下方,
// 不用手动算像素偏移。真正的定位逻辑在 load() 里数据备好之后才挂(见 onLocate)。
let onLocate = null;
const LocateControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd() {
        const btn = L.DomUtil.create('button', 'locate-btn');
        btn.innerHTML = '📍';
        btn.title = '获取你的位置,按距离排序看附近有什么好吃的';
        L.DomEvent.disableClickPropagation(btn);
        L.DomEvent.on(btn, 'click', () => onLocate && onLocate(btn));
        return btn;
    },
});
map.addControl(new LocateControl());

// "旅行轨迹"开关:同样是 topright 的 Leaflet 控件,自动排在定位按钮下方
let onToggleJourney = null;
const JourneyControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd() {
        const btn = L.DomUtil.create('button', 'journey-btn');
        btn.innerHTML = '🧭';
        btn.title = '按时间顺序回放拜访路线';
        L.DomEvent.disableClickPropagation(btn);
        L.DomEvent.on(btn, 'click', () => onToggleJourney && onToggleJourney(btn));
        return btn;
    },
});
map.addControl(new JourneyControl());

// 每次进入都用一个指向目标按钮的气泡提一下作用,避免光靠图标/文字被忽略。
// 之前用 localStorage 记住"看过了"只弹一次,但用户明确要求每次打开都弹,
// 所以去掉了那层记忆——气泡还是会在点击按钮或点气泡本身之后消失,只是
// 不再持久记住,下次刷新页面会重新出现。
function showPointerHint({ targetSelector, text, arrowLeft = false }) {
    const btn = document.querySelector(targetSelector);
    if (!btn) return;

    const hint = document.createElement('div');
    hint.className = 'pointer-hint' + (arrowLeft ? ' arrow-left' : '');
    hint.textContent = text;
    document.body.appendChild(hint);

    function position() {
        const rect = btn.getBoundingClientRect();
        if (arrowLeft) {
            hint.style.left = (rect.right + 10) + 'px';
            hint.style.right = 'auto';
        } else {
            hint.style.right = (window.innerWidth - rect.left + 10) + 'px';
            hint.style.left = 'auto';
        }
        hint.style.top = (rect.top + rect.height / 2 - hint.offsetHeight / 2) + 'px';
    }
    position();
    requestAnimationFrame(() => hint.classList.add('show'));
    window.addEventListener('resize', position);

    const dismiss = () => {
        window.removeEventListener('resize', position);
        hint.classList.remove('show');
        setTimeout(() => hint.remove(), 300);
    };
    // 只在点了按钮(或气泡本身)之后才消失,不设自动超时——用户可能没
    // 第一时间注意到,给够时间看清楚提示在说什么
    btn.addEventListener('click', dismiss, { once: true });
    hint.addEventListener('click', dismiss);
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// 球面距离(公里),Haversine 公式,用于"附近好吃的"排序
function distanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function formatDistance(km) {
    return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(km < 10 ? 1 : 0)}km`;
}

function formatDate(raw) {
    const t = Date.parse(raw);
    if (isNaN(t)) return raw || '';
    const d = new Date(t);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// 按名称哈希挑一个食物 emoji,同一家餐厅在标记/侧栏/弹窗里始终显示同一个
// 图标——纯函数、不依赖任何状态,提到顶层后弹窗和侧栏可以直接调用,不用
// 再作为参数一路传下去。
// 图标本体是微软 Fluent Emoji 的 3D 渲染图(MIT 协议,存在 assets/food-icons/
// 下),不再是纯 emoji 文字——立体渲染质感跟之前给标记加的玻璃高光是同一个
// "让图标更有质感"的思路,只是这次换成真正的立体插画而不是 CSS 模拟。
const FOOD_ICONS = ['dumpling', 'oden', 'fried_shrimp', 'curry_rice', 'cooked_rice', 'bento_box', 'cut_of_meat', 'pancakes', 'fish', 'dango', 'cookie', 'fortune_cookie'];
function pickFoodIcon(name) {
    let h = 0;
    for (const ch of name) h = (h * 31 + ch.codePointAt(0)) % FOOD_ICONS.length;
    return FOOD_ICONS[h];
}
function foodIconImg(name, size) {
    return `<img class="food-icon-img" src="assets/food-icons/${pickFoodIcon(name)}.png" width="${size}" height="${size}" alt="">`;
}

function renderPopup(r) {
    const bloggerTag = isCombinedView && r._blogger ? `<span class="poi-blogger-tag">${escapeHtml(r._blogger)}</span>` : '';
    let html = `<div class="poi-name">${foodIconImg(r.name, 20)} ${escapeHtml(r.name)}${bloggerTag}</div>`;
    for (const v of r.visits) {
        const dishes = (v.dishes || []).map(d => `<span>${escapeHtml(d)}</span>`).join('');
        html += `<div class="visit">
            <div class="visit-date">${formatDate(v.date)}</div>
            ${dishes ? `<div class="visit-dishes">${dishes}</div>` : ''}
            ${v.quote ? `<div class="visit-quote">${escapeHtml(v.quote)}</div>` : ''}
            ${v.postUrl ? `<a class="visit-link" href="${v.postUrl}" target="_blank" rel="noopener">查看原微博 →</a>` : ''}
        </div>`;
    }
    return html;
}

// 合并模式(?name=all 或以后支持的多选)下,弹窗/侧栏要多显示一个博主
// 标签才分得清"这家店是谁探的";单博主模式维持原样,不多显示这个标签。
let isCombinedView = false;

async function load() {
    const bloggerList = await loadBloggerList();
    setupBloggerSelect(bloggerList);
    const namesToLoad = bloggerName === 'all' ? bloggerList : [bloggerName];
    isCombinedView = namesToLoad.length > 1;

    // 纯静态读取:GitHub Pages 没有后端,直接 fetch 仓库里的 JSON 文件。
    // server.mjs 本地起服务时也是同一套相对路径,行为一致。合并模式下并行
    // 请求所有博主(Promise.all,不是依次 await——不然合并两个人就要等
    // 两倍时间),给每条餐厅打上 _blogger 标签(内部字段,跟现有的
    // _marker/_years 一个风格);某个博主的文件缺失/格式不对只跳过并
    // 警告,不因为一个人的数据有问题就让整页什么都不显示。
    const restaurants = [];
    const fetchResults = await Promise.all(namesToLoad.map(async (name) => {
        try {
            const resp = await fetch('data/' + encodeURIComponent(safeName(name)) + '/restaurants.json');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const list = await resp.json();
            if (!Array.isArray(list)) throw new Error('数据格式错误');
            return { name, list };
        } catch (e) {
            console.warn(`加载"${name}"的数据失败,已跳过: ${e.message}`);
            return { name, list: null };
        }
    }));
    for (const { name, list } of fetchResults) {
        if (!list) continue;
        for (const r of list) { r._blogger = name; restaurants.push(r); }
    }

    document.getElementById('bloggerName').textContent = `${namesToLoad.join(' + ')}的美食地图`;

    if (restaurants.length === 0) {
        document.getElementById('emptyHint').style.display = '';
        document.getElementById('emptyHint').textContent = `未找到"${namesToLoad.join('/')}"的数据。请先在本地运行 fetch-posts.mjs + extract-restaurants.mjs,或换用 ?name=陈晓卿 查看示例`;
        return;
    }

    const totalVisits = restaurants.reduce((s, r) => s + r.visits.length, 0);
    document.getElementById('stat').textContent = `${restaurants.length} 家餐厅 · ${totalVisits} 次拜访`;

    // 合并模式下按博主给标记加一圈外环颜色区分是谁探的,不用点开弹窗才知道。
    // 用黄金角配色(跟 yearColor 同一个思路)保证博主数量不管多少都尽量
    // 拉开色相;单博主模式没有这层环,视觉跟之前完全一样。
    const bloggerColorOf = new Map(namesToLoad.map((n, i) => [n, `hsl(${(i * 137.508) % 360}, 65%, 45%)`]));
    document.getElementById('bloggerLegend').innerHTML = isCombinedView
        ? namesToLoad.map(n => `<span class="item"><span class="dot" style="background:${bloggerColorOf.get(n)}"></span>${escapeHtml(n)}</span>`).join('')
        : '';

    // 拜访 ≥2 次的用金色高亮("回头客"信号),半径随拜访次数增大,一眼看出常去的地方
    function makeFoodIcon(r, delayMs) {
        const repeat = r.visits.length >= 2;
        const size = Math.min(26 + r.visits.length * 3, 44);
        // inline style 会整个覆盖掉 CSS 里 .food-pin/.food-pin.repeat 原有的
        // box-shadow(不是叠加),所以合并模式下要把原阴影也一起拼进来,
        // 不然点上的阴影会凭空消失,只剩博主色环
        const baseShadow = repeat
            ? 'inset 0 1px 2px rgba(255,255,255,.9), inset 0 -3px 4px rgba(43,33,24,.18), 0 0 10px rgba(163,105,15,.4)'
            : 'inset 0 1px 2px rgba(255,255,255,.9), inset 0 -3px 4px rgba(43,33,24,.18), 0 2px 8px rgba(43,33,24,.25)';
        const ringStyle = isCombinedView ? `box-shadow:0 0 0 3px ${bloggerColorOf.get(r._blogger) || '#888'}, ${baseShadow};` : '';
        return L.divIcon({
            className: '',
            html: `<div class="food-pin${repeat ? ' repeat' : ''}" style="width:${size}px;height:${size}px;animation-delay:${delayMs}ms;${ringStyle}">${foodIconImg(r.name, Math.round(size * 0.68))}</div>`,
            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
        });
    }

    // 聚类:密集区(如北京、桂林)几十个点挤在一起时收成数字气泡,放大到街道级再展开
    const clusterGroup = L.markerClusterGroup({
        maxClusterRadius: 45,
        disableClusteringAtZoom: 15,
        iconCreateFunction(cluster) {
            const count = cluster.getChildCount();
            // 分四档配色(紫→亮紫→金→红),数字越大颜色越"热",一眼看出哪片是真正的密集区
            const tier = count < 10 ? 1 : count < 30 ? 2 : count < 80 ? 3 : 4;
            const size = count < 10 ? 34 : count < 30 ? 42 : 50;
            return L.divIcon({
                className: '',
                html: `<div class="cluster-pin tier-${tier}" style="width:${size}px;height:${size}px;font-size:${size * 0.32}px">${count}</div>`,
                iconSize: [size, size],
            });
        },
    });

    restaurants.forEach((r, idx) => {
        const marker = L.marker([r.lat, r.lng], { icon: makeFoodIcon(r, Math.min(idx * 3, 450)) });
        marker.bindPopup(renderPopup(r), { maxWidth: 320 });
        clusterGroup.addLayer(marker);
        r._marker = marker; // 供侧栏列表点击联动
        r._years = r.visits.map(v => { const t = Date.parse(v.date); return isNaN(t) ? null : new Date(t).getFullYear(); }).filter(y => y != null);
    });
    map.addLayer(clusterGroup);
    map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40] });

    const sidebar = setupSidebar(restaurants, clusterGroup);
    const choropleth = setupChoropleth(restaurants);
    setupFilters(restaurants, clusterGroup, sidebar, choropleth);
    setupLocate(restaurants, sidebar);
    setupJourney(restaurants, clusterGroup);
    // 稍等一下再弹,避免和地图初次加载的动画抢注意力;两个提示错开时间,
    // 不会在同一瞬间一起弹出来显得很吵。合并模式下点回放按钮只会弹出"请先
    // 选一位博主"的提醒,这个箭头提示指向一个当下点了也没用的按钮,不弹。
    setTimeout(() => showPointerHint({ targetSelector: '.locate-btn', text: '👉 点这里看看附近好吃的' }), 1200);
    if (!isCombinedView) {
        setTimeout(() => showPointerHint({ targetSelector: '.journey-btn', text: '👉 点这里回放旅行轨迹' }), 1600);
    }
    setTimeout(() => showPointerHint({ targetSelector: '#sidebarToggle', text: '👉 点这里看餐厅列表', arrowLeft: true }), 2000);
}

// "定位我"按钮的实现:拿到浏览器地理位置后,在地图上标出"你在这"并把侧栏
// 切到按距离排序的附近榜。不设硬性半径——博主是全球到处跑的美食向导,
// 与其猜一个截断距离不如把最近的几家原样列出来,由用户自己判断远不远。
function setupLocate(restaurants, sidebar) {
    let userMarker = null;
    // 定位权限一旦被拒绝,浏览器不会再弹系统授权框,之后每次点击都会立刻
    // 拿到同一个"已拒绝"错误——用户必须自己去系统/浏览器设置里手动改。
    // "浏览器设置"这个说法太笼统,iOS 和 Android 的操作路径完全不一样,
    // 按 UA 给出具体路径,不然等于没说。
    function geolocationDeniedMsg() {
        const ua = navigator.userAgent;
        if (/iPhone|iPad|iPod/.test(ua)) {
            return '定位被拒绝。请打开系统"设置" → 隐私与安全性 → 定位服务,确认已开启;再找到 Safari(或你使用的浏览器)把定位权限改成"允许",然后回来刷新本页重试。';
        }
        if (/Android/.test(ua)) {
            return '定位被拒绝。请点一下浏览器地址栏左侧的图标(或菜单里的"网站设置"),把"位置"权限改成"允许",然后刷新本页重试。';
        }
        return '定位被拒绝,请在浏览器设置里允许本站访问位置,然后刷新页面重试。';
    }
    onLocate = (btn) => {
        if (!navigator.geolocation) { alert('你的浏览器不支持定位'); return; }
        btn.classList.add('loading');
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                btn.classList.remove('loading');
                const { latitude: lat, longitude: lng } = pos.coords;
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([lat, lng], {
                    icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
                    zIndexOffset: 1000,
                }).addTo(map);
                map.setView([lat, lng], 12);
                sidebar.showNearby(lat, lng);
            },
            (err) => {
                btn.classList.remove('loading');
                const msg = err.code === 1 ? geolocationDeniedMsg()
                    : err.code === 2 ? '无法获取定位,请检查设备定位服务是否开启'
                    : '定位超时,请重试';
                alert(msg);
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    };
}

// 侧栏餐厅列表:按拜访次数排序,支持按名称搜索;点击项目让地图聚焦该标记并弹出详情。
// 返回 { refresh(visibleSet), showNearby(lat,lng) } 供时间滑块/定位按钮联动。
// 旅行轨迹回放:把所有拜访按时间排成一条路线,可以像看时间胶片一样逐点
// 播放。进入轨迹模式后隐藏聚类图层(否则一堆气泡和一条线互相打架,看不清
// 路线),退出后恢复原来的聚类视图和年份滑块(两者互斥,轨迹模式下年份
// 滑块没有意义——轨迹本身就是按时间在动)。
function setupJourney(restaurants, clusterGroup) {
    const journey = [];
    for (const r of restaurants) {
        if (r.lat == null) continue;
        for (const v of r.visits) {
            const t = Date.parse(v.date);
            if (!isNaN(t)) journey.push({ t, date: v.date, lat: r.lat, lng: r.lng, name: r.name, dishes: v.dishes || [] });
        }
    }
    journey.sort((a, b) => a.t - b.t);
    if (journey.length < 2) return; // 数据不够连成一条有意义的路线,不启用这个功能

    // 按年份分配颜色:用黄金角(137.508°)在色环上取点,不管有多少年都能让
    // 相邻年份的颜色尽量拉开,不会挤成一片分不清——比按顺序等分色环更均匀
    const years = [...new Set(journey.map(p => new Date(p.t).getFullYear()))].sort((a, b) => a - b);
    const yearColor = (year) => `hsl(${(years.indexOf(year) * 137.508) % 360}, 62%, 42%)`;

    const journeyBtn = document.querySelector('.journey-btn');
    const barEl = document.getElementById('journeyBar');
    const playBtn = document.getElementById('journeyPlay');
    const progressEl = document.getElementById('journeyProgress');
    const labelEl = document.getElementById('journeyLabel');
    const legendEl = document.getElementById('journeyLegend');
    progressEl.max = journey.length - 1;
    legendEl.innerHTML = years.map(y => `<span class="item"><span class="dot" style="background:${yearColor(y)}"></span>${y}</span>`).join('');

    // 路径不是一条整体折线,而是"点i→点i+1"一段段的小折线,每段按终点所在
    // 年份上色——这样跨年移动时颜色会在年份边界处切换,同一年内的移动始终
    // 是同一色,一眼就能分清"这一片是哪年在这边转"而不是一整条糊在一起。
    let segments = [];
    // 远距离(飞机)的这一段画成弧线而不是直线——航线图传统上都用弧线表示
    // 长途飞行,直线反而不像"飞过去"、更像"贴地挪过去"。用二次贝塞尔曲线
    // 近似:取两点中点,往垂直方向偏移一点当控制点,弯曲程度跟距离成比例
    // (偏移量是中点到两端距离的固定比例,不是绝对像素值,长途线看起来
    // 弯得自然,短途线不会突然弓起一个很夸张的包)。
    // arcControlPoint/quadraticPoint 单独抽出来,是因为画弧线的 arcPoints
    // 和让飞机图标沿弧线滑动的 animateMarkerTo 必须用同一个控制点、同一条
    // 曲线——之前两边各算一套(画线用弧线公式,图标用直线插值),导致图标
    // 走的是直线、背后的线却是弯的,两者对不上。
    function arcControlPoint(a, b, bend) {
        const midLat = (a.lat + b.lat) / 2, midLng = (a.lng + b.lng) / 2;
        const dLat = b.lat - a.lat, dLng = b.lng - a.lng;
        return { lat: midLat - dLng * bend, lng: midLng + dLat * bend };
    }
    function quadraticPoint(a, ctrl, b, t) {
        return {
            lat: (1 - t) ** 2 * a.lat + 2 * (1 - t) * t * ctrl.lat + t ** 2 * b.lat,
            lng: (1 - t) ** 2 * a.lng + 2 * (1 - t) * t * ctrl.lng + t ** 2 * b.lng,
        };
    }
    function arcPoints(a, b, bend, steps = 24) {
        const ctrl = arcControlPoint(a, b, bend);
        const pts = [];
        for (let i = 0; i <= steps; i++) {
            const p = quadraticPoint(a, ctrl, b, i / steps);
            pts.push([p.lat, p.lng]);
        }
        return pts;
    }
    // 开车(近距离)的弧度比飞机(远距离)小得多——短途一小段路弓成跟长途
    // 一样的弧度会显得很夸张,只给一点点弯曲意思一下就够了
    function bendFor(isFar) { return isFar ? 0.45 : 0.15; }
    function rebuildSegments(uptoIndex) {
        for (const seg of segments) map.removeLayer(seg);
        segments = [];
        for (let j = 0; j < uptoIndex; j++) {
            const a = journey[j], b = journey[j + 1];
            const isFar = distanceKm(a.lat, a.lng, b.lat, b.lng) > FAR_THRESHOLD_KM;
            const latlngs = arcPoints(a, b, bendFor(isFar));
            const seg = L.polyline(latlngs, {
                color: yearColor(new Date(b.t).getFullYear()), weight: 3, opacity: 0.85, dashArray: '6 6',
                smoothFactor: 0, // 关掉路径简化——弧线在缩得很远时偏移只有几像素,不关的话会被简化成直线
            }).addTo(map);
            segments.push(seg);
        }
    }

    // 路过的每个地点留一个小食物图标(用跟主地图一致的 foodIconImg,一眼认出
    // 是同一家餐厅),随播放进度逐个"冒出来"而不是一开始就铺满——呼应
    // rebuildSegments 只画到当前进度为止的线段,两者进度保持一致
    let stopMarkers = [];
    function rebuildStopMarkers(uptoIndex) {
        for (const m of stopMarkers) map.removeLayer(m);
        stopMarkers = [];
        for (let j = 0; j <= uptoIndex; j++) {
            const pt = journey[j];
            const m = L.marker([pt.lat, pt.lng], {
                icon: L.divIcon({ className: '', html: `<div class="journey-stop">${foodIconImg(pt.name, 14)}</div>`, iconSize: [20, 20], iconAnchor: [10, 10] }),
                zIndexOffset: 500,
            }).addTo(map);
            stopMarkers.push(m);
        }
    }

    // 两点之间距离决定用什么交通方式的图标——纯粹是视觉隐喻,不是真实
    // 交通方式数据,阈值(80km)选的是"市内开车 vs 跨城/跨国出行"的大致分界
    const FAR_THRESHOLD_KM = 80;
    function journeyIcon(mode) {
        const emoji = mode === 'far' ? '✈️' : '🚗';
        return L.divIcon({
            className: '', html: `<div class="journey-marker">${emoji}</div>`,
            iconSize: [26, 26], iconAnchor: [13, 13],
        });
    }
    const marker = L.marker(journey[0], {
        icon: journeyIcon('near'),
        zIndexOffset: 1000,
    });

    let active = false, playing = false, timer = null, index = 0, lastMode = 'near';
    const timebarEl = document.getElementById('timebar');
    let timebarPrevDisplay = '';

    // 飞机图标之前只在瞬间跳到新位置时露一下脸,900ms 一晃就过去,根本看不清
    // 是什么图标。远距离的这一步改成让图标沿直线平滑"飞"过去(而不是瞬移),
    // 配合下面 play() 里给远距离步骤单独留出更长的停留时间,才看得出"飞机在飞"。
    // 返回一个 promise,在图标真正滑到终点时 resolve——播放调度(见下面的
    // tick())要靠这个知道"这一步到底什么时候才算真正落地",不能只靠猜
    // 一个数字当延时。
    function animateMarkerTo(from, to, duration) {
        const ctrl = arcControlPoint(from, to, bendFor(true)); // 跟 rebuildSegments 画的弧线用同一个控制点(飞机段的弯曲度)
        return new Promise(resolve => {
            const start = performance.now();
            function step(now) {
                const t = Math.min(1, (now - start) / duration);
                const p = quadraticPoint(from, ctrl, to, t);
                marker.setLatLng([p.lat, p.lng]);
                if (t < 1) requestAnimationFrame(step);
                else resolve();
            }
            requestAnimationFrame(step);
        });
    }

    // 镜头飞到新区域时,目标位置的瓦片往往还在下载——如果车/飞机图标不等
    // 瓦片就立刻开始滑动,看起来像"漂浮在一片空白/半空白的底图上飘过去"。
    // 用顶层的 tilesReady 标记等一下,超时(1.5s)兜底,不会因为某张瓦片
    // 一直加载不出来就卡住整个播放。
    function waitForTiles(maxWaitMs = 1200) {
        if (tilesReady) return Promise.resolve();
        return new Promise(resolve => {
            let done = false;
            const finish = () => { if (done) return; done = true; baseLayer.off('load', finish); resolve(); };
            baseLayer.on('load', finish);
            setTimeout(finish, maxWaitMs);
        });
    }

    // flyTo/flyToBounds 调用完的那一刻,Leaflet 还没真的开始为目标视野请求
    // 新瓦片(要等动画推进几帧才会触发)——如果紧接着就去检查 tilesReady,
    // 拿到的还是"上一个视野"的旧状态(当时可能刚好是 true),等于没等。
    // 必须先等镜头动画本身跑完(moveend),这时候 Leaflet 才会把新视野需要
    // 的瓦片请求都发出去,tilesReady 也才会被正确地标记成"在加载"。
    function waitForMoveEnd() {
        return new Promise(resolve => map.once('moveend', resolve));
    }

    function renderStep(i, { pan = false, animateMarker = false } = {}) {
        index = i;
        progressEl.value = i;
        const pt = journey[i];
        const prev = journey[i - 1];
        rebuildSegments(i);
        rebuildStopMarkers(i);
        const distKm = prev ? distanceKm(prev.lat, prev.lng, pt.lat, pt.lng) : 0;
        const mode = distKm > FAR_THRESHOLD_KM ? 'far' : 'near';
        lastMode = mode;
        marker.setIcon(journeyIcon(mode));
        // 返回一个 promise,统一给 moveMarker 本身不返回值(直接瞬移)的
        // 情况包一层 resolve——调用方(tick())不用关心"这一步到底要不要
        // 动画"，只要等这个 promise 完成就代表图标已经真正落到位。
        function moveMarker() {
            if (animateMarker && mode === 'far' && prev) return animateMarkerTo(prev, pt, 1600);
            marker.setLatLng([pt.lat, pt.lng]);
            return Promise.resolve();
        }
        const dishText = pt.dishes.length ? ` · ${pt.dishes.slice(0, 3).join('、')}` : '';
        labelEl.textContent = `${formatDate(pt.date)} ${pt.name}${dishText}`;
        // 近距离(市内开车)放大到看得清街道的程度;远距离(飞机跨城/跨国)
        // 缩小到能把起点和终点都塞进视野,不然缩放没变、地图会突然"跳"到
        // 看不出移动轨迹的一个小点。
        // 但如果这一步的移动本来就还在当前视野内,就不用再挪镜头——判断
        // "在视野内"必须连同缩放级别一起看,不能只看经纬度是否落在当前
        // 画面矩形里:刚进入回放时地图是缩到能装下整条轨迹的大视野,任何
        // 一个点几乎都"技术上"落在这个大矩形里,如果只判断这一条,镜头会
        // 永远卡在最初的大视野上、再也不放大——所以只在"当前缩放已经跟
        // 目标缩放很接近"时才认为"不需要再挪镜头",飞机步骤(缩放目标依
        // 每一步的两点距离而变)则维持原来每次都飞的行为,不做跳过判断。
        // 镜头真的要移动时,先等目标区域的瓦片加载完才让图标动,不然图标
        // 会先"到位"、瓦片才慢慢补上,看起来很突兀。renderStep 把这一串
        // "等镜头动画→等瓦片→挪图标"的 promise 链原样返回给调用方——
        // play() 的调度靠它知道这一步到底什么时候才算真正结束,不用再靠
        // 猜一个"应该够长"的固定延时(之前就是这么栽的:实际耗时经常比
        // 猜的延时长,下一步提前开始,新的镜头动画/瓦片请求跟上一步的还
        // 没结束就叠在一起,看起来永远都"没加载完就动")。
        if (pan) {
            if (mode === 'far' && prev) {
                map.flyToBounds([[prev.lat, prev.lng], [pt.lat, pt.lng]], { padding: [80, 80], maxZoom: 8, duration: 2.2 });
                return waitForMoveEnd().then(waitForTiles).then(moveMarker);
            } else {
                const zoomCloseEnough = Math.abs(map.getZoom() - 12) < 0.6;
                const alreadyVisible = zoomCloseEnough && map.getBounds().pad(-0.15).contains([pt.lat, pt.lng]);
                if (!alreadyVisible) {
                    map.flyTo([pt.lat, pt.lng], 12, { animate: true, duration: 0.9 });
                    return waitForMoveEnd().then(waitForTiles).then(moveMarker);
                }
                return moveMarker();
            }
        }
        return moveMarker();
    }

    function pause() {
        playing = false;
        playBtn.textContent = '▶';
        if (timer) { clearTimeout(timer); timer = null; }
    }
    function play() {
        if (index >= journey.length - 1) index = 0; // 播放完了再点,从头再来一遍
        playing = true;
        playBtn.textContent = '⏸';
        // 之前用固定延时预估"这一步应该多久能播完",猜的数字一旦比实际
        // 耗时(镜头动画+等瓦片+图标滑动全部串联起来)短,下一步就会在上
        // 一步真正落地之前提前开始——新的镜头动画/瓦片请求跟旧的没结束
        // 的叠在一起,表现出来就是"图层还没加载完图标就已经在动"。改成
        // renderStep 返回一个"这一步真正完成"的 promise,等它 resolve
        // 之后才排下一步,不再靠猜时长兜底,只在落地后留一小段停留时间
        // 让人看清图标和标签。
        function tick() {
            if (!playing) return;
            if (index >= journey.length - 1) { pause(); return; }
            Promise.resolve(renderStep(index + 1, { pan: true, animateMarker: true })).then(() => {
                if (!playing) return; // 等待落地的过程中可能被暂停了,不要再排下一步
                timer = setTimeout(tick, lastMode === 'far' ? 900 : 450);
            });
        }
        tick();
    }

    function enter() {
        active = true;
        journeyBtn.classList.add('active');
        map.removeLayer(clusterGroup);
        timebarPrevDisplay = timebarEl.style.display; // 轨迹模式下时间由播放进度表达,先记住原来的显示状态再隐藏,退出时还原
        timebarEl.style.display = 'none';
        marker.addTo(map);
        barEl.classList.add('show');
        renderStep(0, { pan: false });
        map.fitBounds(L.latLngBounds(journey.map(p => [p.lat, p.lng])), { padding: [60, 60] });
    }
    function exit() {
        active = false;
        pause();
        journeyBtn.classList.remove('active');
        for (const seg of segments) map.removeLayer(seg);
        segments = [];
        for (const m of stopMarkers) map.removeLayer(m);
        stopMarkers = [];
        map.removeLayer(marker);
        barEl.classList.remove('show');
        timebarEl.style.display = timebarPrevDisplay;
        map.addLayer(clusterGroup);
        map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40] });
    }

    // 合并模式下把两个人的拜访时间线揉在一起按时间顺序播放,会在城市之间
    // 没有意义地来回跳(两人是各自独立的行程,不是同一段旅程)——不如让
    // 用户用顶部已有的下拉框先选定一位博主,回放才是在讲一个人的故事
    onToggleJourney = () => {
        if (isCombinedView && !active) {
            alert('轨迹回放是按一个人的时间顺序播放的,"全部"模式下两人的行程会混在一起、来回跳,没有意义。请先用顶部下拉框选择一位博主,再点这个按钮。');
            return;
        }
        active ? exit() : enter();
    };
    playBtn.addEventListener('click', () => { playing ? pause() : play(); });
    progressEl.addEventListener('input', () => { pause(); renderStep(Number(progressEl.value), { pan: false }); });
    document.getElementById('journeyExit').addEventListener('click', exit);
}

// 侧栏餐厅列表:按拜访次数排序,支持按名称搜索;点击项目让地图聚焦该标记并弹出详情。
// 返回 { refresh(visibleSet), showNearby(lat,lng) } 供时间滑块/定位按钮联动。
function setupSidebar(restaurants, clusterGroup) {

    const sorted = [...restaurants].sort((a, b) => b.visits.length - a.visits.length);
    const listEl = document.getElementById('sidebarList');
    const searchEl = document.getElementById('sidebarSearch');
    const bannerEl = document.getElementById('nearbyBanner');
    const bannerTextEl = document.getElementById('nearbyBannerText');
    let visibleSet = null; // null = 不做时间过滤(全部可见)
    let nearbyOrigin = null; // {lat,lng} = 处于"附近好吃的"模式

    function baseList() {
        let list = visibleSet ? sorted.filter(r => visibleSet.has(r)) : sorted;
        if (nearbyOrigin) {
            list = [...list].sort((a, b) => distanceKm(nearbyOrigin.lat, nearbyOrigin.lng, a.lat, a.lng) - distanceKm(nearbyOrigin.lat, nearbyOrigin.lng, b.lat, b.lng));
        }
        return list;
    }

    function renderList() {
        const q = searchEl.value.trim().toLowerCase();
        let filtered = q ? baseList().filter(r => r.name.toLowerCase().includes(q)) : baseList();
        if (nearbyOrigin && !q) filtered = filtered.slice(0, 20); // 不限定搜索时只列最近 20 家,避免刷到天荒地老
        if (filtered.length === 0) {
            listEl.innerHTML = '<div class="sidebar-empty">没有匹配的餐厅</div>';
            return;
        }
        listEl.innerHTML = filtered.map((r) => {
            const idx = sorted.indexOf(r);
            const rightSpan = nearbyOrigin
                ? `<span class="dist">${formatDistance(distanceKm(nearbyOrigin.lat, nearbyOrigin.lng, r.lat, r.lng))}</span>`
                : `<span class="count${r.visits.length >= 2 ? ' repeat' : ''}">${r.visits.length}次</span>`;
            return `<div class="sidebar-item" data-idx="${idx}">
                <span class="emoji">${foodIconImg(r.name, 18)}</span>
                <span class="name">${escapeHtml(r.name)}</span>
                ${isCombinedView && r._blogger ? `<span class="blogger-tag">${escapeHtml(r._blogger)}</span>` : ''}
                ${rightSpan}
            </div>`;
        }).join('');
    }
    renderList();
    searchEl.addEventListener('input', renderList);

    listEl.addEventListener('click', (e) => {
        const item = e.target.closest('.sidebar-item');
        if (!item) return;
        const r = sorted[Number(item.dataset.idx)];
        if (!r || !r._marker) return;
        // 标记可能仍被聚合在数字气泡里,zoomToShowLayer 会自动放大到它单独显示为止
        clusterGroup.zoomToShowLayer(r._marker, () => r._marker.openPopup());
    });

    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebarEl = document.getElementById('sidebar');
    toggleBtn.addEventListener('click', () => {
        sidebarEl.classList.toggle('collapsed');
        toggleBtn.classList.toggle('collapsed');
    });

    document.getElementById('nearbyBack').addEventListener('click', () => {
        nearbyOrigin = null;
        bannerEl.style.display = 'none';
        renderList();
    });

    return {
        refresh(newVisibleSet) { visibleSet = newVisibleSet; renderList(); },
        showNearby(lat, lng) {
            nearbyOrigin = { lat, lng };
            const nearest = baseList()[0];
            const nearestKm = nearest ? distanceKm(lat, lng, nearest.lat, nearest.lng) : Infinity;
            bannerTextEl.textContent = nearestKm > 100 ? `附近暂无记录,以下是离你最近的地点` : `离你最近`;
            bannerEl.style.display = 'flex';
            sidebarEl.classList.remove('collapsed');
            toggleBtn.classList.remove('collapsed');
            searchEl.value = '';
            renderList();
        },
    };
}

// 年份滑块 + 洲/国/省/市四级联动下拉的组合筛选器。所有层级共享同一套
// "重算可见集合"逻辑(取交集),这样"2020年在中国广东省吃过的地方"这种
// 组合筛选是自然成立的,不需要分别维护几套状态。重建 clusterGroup 的图层
// 而非仅调透明度——否则聚合气泡上的数字会继续把范围外的点计进去,失去
// "筛选"的意义。
const REGION_LEVELS = [
    { key: 'continent', id: 'continentSelect', placeholder: '全部洲' },
    { key: 'country', id: 'countrySelect', placeholder: '全部国家' },
    { key: 'province', id: 'provinceSelect', placeholder: '全部省' },
    { key: 'city', id: 'citySelect', placeholder: '全部市' },
];

// 兼容两种数据来源:geocode-regions.mjs 写入的结构化 location(优先),
// 或旧版按发帖 IP 算出的扁平 region 字段(退化成"只有市"这一级)。
function regionOf(r) {
    const loc = r.location || {};
    return {
        continent: loc.continent || null,
        country: loc.country || null,
        province: loc.province || null,
        city: loc.city || r.region || null,
    };
}

function setupFilters(restaurants, clusterGroup, sidebar, choropleth) {
    const allYears = restaurants.flatMap(r => r._years);
    const hasYearFilter = allYears.length > 0 && Math.min(...allYears) !== Math.max(...allYears);
    const minYear = hasYearFilter ? Math.min(...allYears) : null;
    const maxYear = hasYearFilter ? Math.max(...allYears) : null;

    const fromEl = document.getElementById('yearFrom');
    const toEl = document.getElementById('yearTo');
    const fromLabel = document.getElementById('yearFromLabel');
    const toLabel = document.getElementById('yearToLabel');
    const fillEl = document.getElementById('yearRangeFill');
    if (hasYearFilter) {
        document.getElementById('timebar').style.display = 'flex';
        for (const el of [fromEl, toEl]) { el.min = minYear; el.max = maxYear; }
        fromEl.value = minYear;
        toEl.value = maxYear;
    }

    // 单轴双手柄:拖动一端不能越过另一端,而是把对方推着走——比"允许穿过
    // 再在计算时交换 from/to"更符合直觉,用户看到的手柄位置和自己拖动的
    // 手感一致,不会出现"明明在拖右边,数字却突然变成左边"的错位感。
    function clampHandles(movedEl) {
        if (Number(fromEl.value) > Number(toEl.value)) {
            if (movedEl === fromEl) toEl.value = fromEl.value;
            else fromEl.value = toEl.value;
        }
    }
    function updateFill() {
        if (!hasYearFilter) return;
        const min = Number(fromEl.min), max = Number(fromEl.max);
        const THUMB_RADIUS = 8; // 手柄半径,和 .range-input::-webkit/moz-range-thumb 的尺寸对应
        const trackWidth = document.getElementById('yearRangeSlider').offsetWidth - THUMB_RADIUS * 2;
        const pxPos = v => THUMB_RADIUS + (max === min ? 0 : (v - min) / (max - min) * trackWidth);
        const left = pxPos(Number(fromEl.value)), right = pxPos(Number(toEl.value));
        fillEl.style.left = left + 'px';
        fillEl.style.width = Math.max(0, right - left) + 'px';
    }

    const hasAnyRegion = restaurants.some(r => Object.values(regionOf(r)).some(Boolean));
    const selects = Object.fromEntries(REGION_LEVELS.map(l => [l.key, document.getElementById(l.id)]));
    if (hasAnyRegion) document.getElementById('regionFilters').style.display = '';

    // 按"排在它前面的层级当前选了什么"筛出候选餐厅,用来给某一级下拉生成选项——
    // 这就是级联的核心:选了"中国"之后,"省"这一级只列中国的省,不会混进法国的大区
    function candidatesAbove(levelIdx) {
        return restaurants.filter(r => {
            const reg = regionOf(r);
            for (let i = 0; i < levelIdx; i++) {
                const val = selects[REGION_LEVELS[i].key].value;
                if (val && reg[REGION_LEVELS[i].key] !== val) return false;
            }
            return true;
        });
    }

    function populateLevel(levelIdx) {
        const { key, placeholder } = REGION_LEVELS[levelIdx];
        const selectEl = selects[key];
        const counts = new Map();
        for (const r of candidatesAbove(levelIdx)) {
            const v = regionOf(r)[key];
            if (v) counts.set(v, (counts.get(v) || 0) + 1);
        }
        const entries = [...counts.entries()].sort((a, b) => b[1] - a[1]);
        selectEl.innerHTML = `<option value="">${placeholder}</option>` +
            entries.map(([v, c]) => `<option value="${escapeHtml(v)}">${escapeHtml(v)}(${c})</option>`).join('');
    }

    // 某一级变化时,它右边的所有层级都要清空重新生成选项(不然会出现
    // "洲选了欧洲,市却还停留在之前选的广州市"这种不一致状态)
    function cascadeFrom(changedIdx) {
        for (let i = changedIdx + 1; i < REGION_LEVELS.length; i++) {
            selects[REGION_LEVELS[i].key].value = '';
            populateLevel(i);
        }
    }

    if (hasAnyRegion) {
        populateLevel(0);
        REGION_LEVELS.forEach((level, idx) => {
            selects[level.key].addEventListener('change', () => { cascadeFrom(idx); apply(); });
        });
        // 初始就把下面几级的选项铺好(此时都是"全部",候选是全量数据)
        for (let i = 1; i < REGION_LEVELS.length; i++) populateLevel(i);
    }

    const totalVisitsAll = restaurants.reduce((s, r) => s + r.visits.length, 0);

    function apply() {
        let from = minYear, to = maxYear;
        if (hasYearFilter) {
            from = Number(fromEl.value); to = Number(toEl.value);
            fromLabel.textContent = from;
            toLabel.textContent = to;
            updateFill();
        }

        const visible = restaurants.filter(r => {
            if (hasYearFilter && !r._years.some(y => y >= from && y <= to)) return false;
            if (!hasAnyRegion) return true;
            const reg = regionOf(r);
            return REGION_LEVELS.every(({ key }) => !selects[key].value || reg[key] === selects[key].value);
        });
        clusterGroup.clearLayers();
        clusterGroup.addLayers(visible.map(r => r._marker));

        const isFiltered = visible.length !== restaurants.length;
        const visitCount = visible.reduce((s, r) => s + r.visits.length, 0);
        const parts = [];
        if (hasYearFilter && (from !== minYear || to !== maxYear)) parts.push(`${from}–${to} 年`);
        if (hasAnyRegion) {
            const picked = REGION_LEVELS.map(({ key }) => selects[key].value).filter(Boolean);
            if (picked.length) parts.push(picked.join(' / '));
        }
        document.getElementById('stat').textContent = isFiltered
            ? `${visible.length} 家餐厅 · ${visitCount} 次拜访(${parts.join(' · ')},共 ${restaurants.length} 家)`
            : `${restaurants.length} 家餐厅 · ${totalVisitsAll} 次拜访`;

        sidebar.refresh(isFiltered ? new Set(visible) : null);
        choropleth.update(visible);
    }
    if (hasYearFilter) {
        fromEl.addEventListener('input', () => { clampHandles(fromEl); apply(); });
        toEl.addEventListener('input', () => { clampHandles(toEl); apply(); });
        document.getElementById('yearReset').addEventListener('click', () => {
            fromEl.value = minYear; toEl.value = maxYear; apply();
        });
    }
    apply();
}

load();
</script>
</body>
</html>
